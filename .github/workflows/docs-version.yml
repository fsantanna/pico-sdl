name: Docs Version

on:
  push:
    branches: ['v*']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: gh-pages
    - name: Copy main to version
      run: |
        ver="${GITHUB_REF#refs/heads/}"
        cp -r main "$ver"
        git add .
        if git diff --cached --quiet; then
            echo "No changes to commit ($ver already exists)"
        else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "docs: add $ver"
            git push origin gh-pages
        fi
